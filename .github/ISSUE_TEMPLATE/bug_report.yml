name: Bug report
description: Something in the SDK doesn't behave as documented.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! Before submitting, please check existing
        issues to avoid duplicates. For security-relevant issues,
        please use [private vulnerability reporting](https://github.com/DojoCodingLabs/whatsapp-adapter/security/advisories/new)
        instead of a public issue.

  - type: input
    id: version
    attributes:
      label: "`@dojocoding/whatsapp` version"
      description: "Output of `pnpm list @dojocoding/whatsapp` (or your equivalent)."
      placeholder: "0.7.1"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: "`node --version`"
      placeholder: "v22.10.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node
        - Bun
        - Deno
        - Cloudflare Workers
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: subpath
    attributes:
      label: Subpath(s) in use
      multiple: true
      options:
        - "@dojocoding/whatsapp (root)"
        - "@dojocoding/whatsapp/express"
        - "@dojocoding/whatsapp/web"
        - "@dojocoding/whatsapp/hono"
        - "@dojocoding/whatsapp/storage/redis"
        - "@dojocoding/whatsapp/storage/postgres"

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen, and which doc / spec scenario suggested it?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include the exact error class, code, and message if applicable.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        A short snippet — ideally using `MockWhatsAppClient` so we
        can run it without Meta credentials. Please redact any real
        phone numbers, tokens, or app secrets.
      render: ts
    validations:
      required: true

  - type: textarea
    id: meta
    attributes:
      label: Meta payload (if relevant)
      description: |
        For webhook-receiver bugs, the inbound JSON payload. **Redact
        PII** (phone numbers, names) before posting.
      render: json

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, stack traces, hunches.
