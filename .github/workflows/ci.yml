name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/adapters/express/index.js
          test -f dist/adapters/express/index.cjs
          test -f dist/adapters/express/index.d.ts

      - name: Verify pack contents (dry-run)
        run: |
          pnpm pack --pack-destination /tmp >/dev/null
          tarball=$(ls /tmp/dojocoding-whatsapp-*.tgz | head -n 1)
          echo "Tarball: $tarball"
          tar tzf "$tarball" | sort | tee /tmp/pack-contents.txt
          # Required entries — fail if any are missing.
          for required in package/LICENSE package/README.md package/CHANGELOG.md package/package.json package/dist/index.js package/dist/index.cjs package/dist/index.d.ts; do
            grep -qx "$required" /tmp/pack-contents.txt || { echo "Missing from tarball: $required"; exit 1; }
          done
          # Source / test / coverage should never ship.
          for forbidden in package/src package/test package/coverage package/node_modules package/.github package/openspec; do
            if grep -q "^$forbidden" /tmp/pack-contents.txt; then
              echo "Forbidden entry shipped: $forbidden"; exit 1
            fi
          done

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14
