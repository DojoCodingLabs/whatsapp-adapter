name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test · build (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # Non-blocking initially. We surface advisories in the run
        # log without breaking PRs while the noise floor is
        # established. Flip to fail-on-high in a follow-up once the
        # baseline is clean.
        run: pnpm audit --prod --audit-level=moderate
        continue-on-error: true

      - name: Build SDK first (so MCP can import its types)
        # The MCP package's workspace:* dep on the SDK resolves to
        # the SDK's package entry, which points at dist/index.d.ts.
        # We need the SDK built before MCP can typecheck.
        working-directory: packages/whatsapp-sdk
        run: pnpm build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Lint (all packages)
        run: pnpm -r lint

      - name: Format check
        run: pnpm format:check

      - name: Test — SDK (with coverage)
        working-directory: packages/whatsapp-sdk
        run: pnpm test:coverage

      - name: Test — MCP
        working-directory: packages/whatsapp-mcp
        run: pnpm test

      - name: Build MCP
        working-directory: packages/whatsapp-mcp
        run: pnpm build

      - name: Verify SDK build artifacts
        working-directory: packages/whatsapp-sdk
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/adapters/express/index.js
          test -f dist/adapters/express/index.cjs
          test -f dist/adapters/express/index.d.ts
          test -f dist/adapters/web/index.js
          test -f dist/adapters/web/index.cjs
          test -f dist/adapters/web/index.d.ts
          test -f dist/adapters/hono/index.js
          test -f dist/adapters/hono/index.cjs
          test -f dist/adapters/hono/index.d.ts
          test -f dist/storage/redis.js
          test -f dist/storage/redis.cjs
          test -f dist/storage/redis.d.ts
          test -f dist/storage/postgres.js
          test -f dist/storage/postgres.cjs
          test -f dist/storage/postgres.d.ts

      - name: Verify MCP build artifacts
        working-directory: packages/whatsapp-mcp
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/cli.js
          test -x dist/cli.js

      - name: Bundle size budgets (size-limit, all packages)
        # Enforces per-entry-point size budgets defined in each
        # package's `size-limit` config. Fails the build if any
        # tracked bundle exceeds its limit.
        run: pnpm -r size

      - name: Verify SDK pack contents (dry-run)
        working-directory: packages/whatsapp-sdk
        run: |
          pnpm pack --pack-destination /tmp >/dev/null
          tarball=$(ls /tmp/dojocoding-whatsapp-sdk-*.tgz | head -n 1)
          echo "Tarball: $tarball"
          tar tzf "$tarball" | sort | tee /tmp/sdk-pack-contents.txt
          # Required entries — fail if any are missing.
          for required in \
            package/LICENSE \
            package/README.md \
            package/CHANGELOG.md \
            package/package.json \
            package/dist/index.js \
            package/dist/index.cjs \
            package/dist/index.d.ts \
            package/dist/adapters/express/index.js \
            package/dist/adapters/express/index.cjs \
            package/dist/adapters/express/index.d.ts \
            package/dist/adapters/web/index.js \
            package/dist/adapters/web/index.cjs \
            package/dist/adapters/web/index.d.ts \
            package/dist/adapters/hono/index.js \
            package/dist/adapters/hono/index.cjs \
            package/dist/adapters/hono/index.d.ts \
            package/dist/storage/redis.js \
            package/dist/storage/redis.cjs \
            package/dist/storage/redis.d.ts \
            package/dist/storage/postgres.js \
            package/dist/storage/postgres.cjs \
            package/dist/storage/postgres.d.ts
          do
            grep -qx "$required" /tmp/sdk-pack-contents.txt || { echo "Missing from SDK tarball: $required"; exit 1; }
          done
          # Source / test / coverage should never ship.
          for forbidden in package/src package/test package/coverage package/node_modules package/.github package/openspec; do
            if grep -q "^$forbidden" /tmp/sdk-pack-contents.txt; then
              echo "Forbidden entry shipped: $forbidden"; exit 1
            fi
          done

      - name: Verify MCP pack contents (dry-run)
        working-directory: packages/whatsapp-mcp
        run: |
          pnpm pack --pack-destination /tmp >/dev/null
          tarball=$(ls /tmp/dojocoding-whatsapp-mcp-*.tgz | head -n 1)
          echo "Tarball: $tarball"
          tar tzf "$tarball" | sort | tee /tmp/mcp-pack-contents.txt
          for required in \
            package/LICENSE \
            package/README.md \
            package/CHANGELOG.md \
            package/package.json \
            package/dist/index.js \
            package/dist/index.cjs \
            package/dist/index.d.ts \
            package/dist/cli.js
          do
            grep -qx "$required" /tmp/mcp-pack-contents.txt || { echo "Missing from MCP tarball: $required"; exit 1; }
          done
          for forbidden in package/src package/test package/coverage package/node_modules package/.github package/openspec; do
            if grep -q "^$forbidden" /tmp/mcp-pack-contents.txt; then
              echo "Forbidden entry shipped: $forbidden"; exit 1
            fi
          done

      - name: Upload coverage report (SDK)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: packages/whatsapp-sdk/coverage/
          if-no-files-found: ignore
          retention-days: 14
