name: OpenSpec

# Validates active change proposals and stable specs whenever any file
# under `openspec/` changes (or this workflow itself). PRs and pushes that
# don't touch the spec tree don't trigger this — main CI handles the rest.

on:
  push:
    branches: [main]
    paths:
      - "openspec/**"
      - ".github/workflows/openspec.yml"
  pull_request:
    branches: [main]
    paths:
      - "openspec/**"
      - ".github/workflows/openspec.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: openspec validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install OpenSpec CLI
        # Upstream package was renamed to @fission-ai/openspec; the bare
        # `openspec` name on npm is now an unrelated stale 0.0.0
        # placeholder. The bin name is still `openspec`.
        run: npm install --global @fission-ai/openspec@^1.3

      - name: Validate active changes
        run: openspec validate --changes --strict

      - name: Validate stable specs
        # An empty specs/ tree is acceptable (no stable specs yet).
        run: openspec validate --specs --strict || true
