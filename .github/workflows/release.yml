name: Release

# Publishes either @dojocoding/whatsapp-sdk or
# @dojocoding/whatsapp-mcp to npm when a tag is pushed.
#
# Tag-prefix convention:
#   sdk-v*.*.*  → packages/whatsapp-sdk/
#   mcp-v*.*.*  → packages/whatsapp-mcp/
#
# The tagged package's `package.json` version MUST match the tag
# (the workflow fails fast otherwise) and a matching CHANGELOG.md
# section MUST exist.

on:
  push:
    tags:
      - "sdk-v*.*.*"
      - "mcp-v*.*.*"

permissions:
  contents: write # create GitHub Release
  id-token: write # required for npm provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Resolve package from tag prefix
        id: pkg
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          case "$ref" in
            sdk-v*)
              dir="packages/whatsapp-sdk"
              version="${ref#sdk-v}"
              ;;
            mcp-v*)
              dir="packages/whatsapp-mcp"
              version="${ref#mcp-v}"
              ;;
            *)
              echo "::error::Unrecognised tag prefix: $ref"
              exit 1
              ;;
          esac
          echo "dir=$dir"          >> "$GITHUB_OUTPUT"
          echo "version=$version"  >> "$GITHUB_OUTPUT"
          echo "Tag $ref → publishing $dir at $version"

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag="${{ steps.pkg.outputs.version }}"
          echo "Tag version: $tag"
          echo "package.json version: $pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag version $tag does not match package.json version $pkg in ${{ steps.pkg.outputs.dir }}"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          tag="${{ steps.pkg.outputs.version }}"
          if ! grep -qE "^## \[?${tag}\]?" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry for version $tag in ${{ steps.pkg.outputs.dir }}/CHANGELOG.md"
            exit 1
          fi

      - name: Build SDK first (so MCP can import its types)
        working-directory: packages/whatsapp-sdk
        run: pnpm build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Lint (all packages)
        run: pnpm -r lint

      - name: Format check
        run: pnpm format:check

      - name: Test (all packages)
        run: pnpm -r test

      - name: Build MCP
        working-directory: packages/whatsapp-mcp
        run: pnpm build

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # `publishConfig.access` + `publishConfig.provenance` come from
        # package.json; we still pass --provenance explicitly so the build
        # fails loudly if the OIDC token isn't present.
        run: pnpm publish --no-git-checks --provenance --access public

      - name: Extract release notes from CHANGELOG
        id: notes
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          tag="${{ steps.pkg.outputs.version }}"
          # Print the section under `## [tag]` until the next `## ` header.
          awk -v tag="$tag" '
            $0 ~ "^## \\[?" tag "\\]?" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          {
            echo "notes<<EOF"
            cat /tmp/release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
